<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feature tests</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <style>#scratch{position:fixed;left:-9999px;top:0}</style>
</head>
<body>
<!-- offscreen scratch area so layout/getClientRects work -->
<div id="scratch"></div>
<pre id="out" style="padding:16px;font-family:monospace"></pre>
<script type="module">
  import { BlockEditor } from '/src/components/block-editor.js';
  import { Database } from '/src/core/database.js';
  import { Editor } from '/src/components/editor.js';
  import { BannerControl, BANNER_GRADIENTS } from '/src/components/banner.js';
  import { TrashView } from '/src/components/trash-view.js';
  import { Modal } from '/src/components/modal.js';
  import { NoteList } from '/src/components/note-list.js';
  import { CommandPalette } from '/src/components/command-palette.js';
  import { SettingsView } from '/src/components/settings-view.js';
  import { GraphView } from '/src/components/graph.js';
  import { TEMPLATES } from '/src/app/templates.js';
  import { fileToBannerDataURL } from '/src/utils/image.js';
  import { parse, serialize } from '/src/utils/blocks.js';
  import { buildNoteHtmlDoc, flattenExportWikilinks } from '/src/utils/export.js';
  import { renderMarkdown, setKnownTitles } from '/src/utils/markdown.js';

  const results = [];
  const check = (name, cond) => results.push((cond ? 'PASS' : 'FAIL') + '  ' + name);
  const section = (name, fn) => { try { fn(); } catch (e) { results.push('FAIL  ' + name + ' — threw: ' + e.message); } };

  const scratch = document.getElementById('scratch');
  const mkHost = () => { const h = document.createElement('div'); h.className = 'editor__blocks'; scratch.appendChild(h); return h; };
  const setCaretEnd = (el) => { el.focus(); const s = getSelection(), r = document.createRange(); r.selectNodeContents(el); r.collapse(false); s.removeAllRanges(); s.addRange(r); };
  const setCaretAt = (el, off) => { el.focus(); const n = el.firstChild || el; const s = getSelection(), r = document.createRange(); r.setStart(n, Math.min(off, (n.textContent||'').length)); r.collapse(true); s.removeAllRanges(); s.addRange(r); };
  const type = (el, text) => { el.textContent = text; setCaretEnd(el); el.dispatchEvent(new InputEvent('input', { bubbles: true })); };
  const key = (el, k, opts = {}) => el.dispatchEvent(new KeyboardEvent('keydown', { key: k, bubbles: true, cancelable: true, ...opts }));
  const focusedContent = () => document.activeElement;
  const rowType = (elm) => elm?.closest?.('.blk-row')?.dataset.type;
  const TITLES = ['Alpha', 'Beta'];
  const mkBE = (md) => new BlockEditor(mkHost(), { initialMarkdown: md, getTitles: () => TITLES, onOpenWikilink: (t) => (mkBE._opened = t) });

  // ============ block rendering (every type) ============
  section('render all block types', () => {
    const be = mkBE(['# H', '- b', '1. n', '- [ ] t', '> q', '```\nc\n```', '@date(2026-07-01)', '---', 'p'].join('\n\n'));
    const host = be.host;
    for (const t of ['heading', 'bullet', 'numbered', 'todo', 'quote', 'code', 'date', 'divider', 'paragraph']) {
      check(`renders ${t} row`, !!host.querySelector(`.blk-row[data-type="${t}"]`));
    }
    check('date chip renders', !!host.querySelector('.blk-row[data-type="date"] .blk-date'));
    check('divider renders <hr>', !!host.querySelector('.blk-row[data-type="divider"] hr'));
    check('todo renders checkbox', !!host.querySelector('.blk-row[data-type="todo"] .blk-check'));
  });

  // ============ markdown shortcuts ============
  section('markdown shortcuts', () => {
    const cases = [
      ['# ', 'heading'], ['## ', 'heading'], ['### ', 'heading'],
      ['- ', 'bullet'], ['1. ', 'numbered'], ['[] ', 'todo'], ['[x] ', 'todo'], ['> ', 'quote'],
    ];
    for (const [trigger, expected] of cases) {
      const be = mkBE('');
      const blk = be.host.querySelector('.blk');
      blk.focus();
      type(blk, trigger);
      check(`"${trigger.trim()} " -> ${expected}`, rowType(focusedContent()) === expected);
    }
    // divider + code fence via shortcuts
    const be2 = mkBE('');
    const b2 = be2.host.querySelector('.blk'); b2.focus(); type(b2, '---');
    check('"---" -> divider', !!be2.host.querySelector('.blk-row[data-type="divider"]'));
    const be3 = mkBE('');
    const b3 = be3.host.querySelector('.blk'); b3.focus(); type(b3, '```js'); key(b3, 'Enter');
    check('"```js" + Enter -> code', rowType(focusedContent()) === 'code');
  });

  // ============ slash menu (open, filter, select date & divider) ============
  section('slash menu', () => {
    const be = mkBE('');
    const blk = be.host.querySelector('.blk'); blk.focus();
    type(blk, '/');
    let menu = document.querySelector('.blk-menu');
    check('slash menu opens', !!menu && menu.querySelectorAll('.blk-menu__item').length >= 10);
    type(blk, '/date');
    menu = document.querySelector('.blk-menu');
    check('slash filters to Date', !!menu && /Date/.test(menu.textContent) && !/Heading/.test(menu.textContent));
    key(blk, 'Enter');
    check('slash "date" creates date block', !!be.host.querySelector('.blk-row[data-type="date"]'));
    check('date serializes to @date(...)', /@date\(\d{4}-\d{2}-\d{2}\)/.test(be.serialize()));
    // divider via slash
    const be2 = mkBE('');
    const b2 = be2.host.querySelector('.blk'); b2.focus(); type(b2, '/div');
    key(b2, 'Enter');
    check('slash "div" creates divider', !!be2.host.querySelector('.blk-row[data-type="divider"]'));
    // keyboard nav in menu
    const be3 = mkBE('');
    const b3 = be3.host.querySelector('.blk'); b3.focus(); type(b3, '/');
    key(b3, 'ArrowDown'); key(b3, 'ArrowDown'); key(b3, 'Escape');
    check('Escape closes menu leaving text', !document.querySelector('.blk-menu'));
  });

  // ============ menu scroll fix ============
  section('menu scroll does not close menu', () => {
    const be = mkBE('');
    const blk = be.host.querySelector('.blk'); blk.focus(); type(blk, '/');
    const menu = document.querySelector('.blk-menu');
    check('menu present before scroll', !!menu);
    // scroll INSIDE the menu: must stay open
    menu.dispatchEvent(new Event('scroll', { bubbles: true }));
    check('scroll inside menu keeps it open', !!document.querySelector('.blk-menu'));
    // scroll on the editor host: must close
    be.host.dispatchEvent(new Event('scroll', { bubbles: true }));
    check('scroll outside menu closes it', !document.querySelector('.blk-menu'));
  });

  // ============ date block: picker changes value ============
  section('date picker updates value', () => {
    const be = mkBE('@date(2026-07-01)');
    const chip = be.host.querySelector('.blk-date');
    check('date chip shows formatted label', /2026/.test(chip.textContent));
    chip.dispatchEvent(new MouseEvent('click', { bubbles: true }));
    const input = be.host.querySelector('.blk-date-input');
    check('clicking chip opens date input', !!input);
    input.value = '2030-01-15';
    input.dispatchEvent(new Event('change', { bubbles: true }));
    check('changing date updates serialize', be.serialize() === '@date(2030-01-15)');
    check('chip restored after change', !!be.host.querySelector('.blk-date'));
  });

  // ============ non-text block delete/nav (divider + date) ============
  section('non-text block select + delete', () => {
    for (const md of ['a\n\n---\n\nb', 'a\n\n@date(2026-07-01)\n\nb']) {
      const be = mkBE(md);
      const ntRow = be.host.querySelector('.blk-row[data-type="divider"], .blk-row[data-type="date"]');
      const kind = ntRow.dataset.type;
      // click to select
      ntRow.querySelector('.blk').dispatchEvent(new MouseEvent('mousedown', { bubbles: true, cancelable: true }));
      check(`${kind} selectable by click`, be.host.querySelector('.blk-row--selected')?.dataset.type === kind);
      // Backspace deletes the selected non-text block
      be.host.querySelector('.blk-row').dispatchEvent(new KeyboardEvent('keydown', { key: 'Backspace', bubbles: true, cancelable: true }));
      check(`${kind} deleted on Backspace`, !be.host.querySelector(`.blk-row[data-type="${kind}"]`));
    }
    // Backspace at start of paragraph after a date removes the date
    const be2 = mkBE('@date(2026-07-01)\n\ntext');
    const para = [...be2.host.querySelectorAll('.blk-row[data-type="paragraph"] .blk')].pop();
    para.focus(); setCaretAt(para, 0);
    key(para, 'Backspace');
    check('Backspace-at-start after date deletes the date', !be2.host.querySelector('.blk-row[data-type="date"]'));
  });

  // ============ keyboard model: Enter/Backspace/Tab ============
  section('keyboard model', () => {
    // Enter splits paragraph
    let be = mkBE('helloworld');
    let blk = be.host.querySelector('.blk'); blk.focus(); setCaretAt(blk, 5);
    key(blk, 'Enter');
    check('Enter splits at caret', be.serialize() === 'hello\n\nworld');
    // Enter continues a bullet list
    be = mkBE('- one');
    blk = be.host.querySelector('.blk'); blk.focus(); setCaretEnd(blk);
    key(blk, 'Enter');
    check('Enter continues bullet list', rowType(focusedContent()) === 'bullet' && be.host.querySelectorAll('.blk-row[data-type="bullet"]').length === 2);
    // Enter on empty list item exits the list
    key(focusedContent(), 'Enter');
    check('Enter on empty list item exits to paragraph', rowType(focusedContent()) === 'paragraph');
    // Backspace at start demotes heading to paragraph
    be = mkBE('# title');
    blk = be.host.querySelector('.blk'); blk.focus(); setCaretAt(blk, 0);
    key(blk, 'Backspace');
    check('Backspace-at-start demotes heading to paragraph', rowType(focusedContent()) === 'paragraph');
    // Backspace at start merges into previous
    be = mkBE('aaa\n\nbbb');
    const second = [...be.host.querySelectorAll('.blk')][1]; second.focus(); setCaretAt(second, 0);
    key(second, 'Backspace');
    check('Backspace merges into previous block', be.serialize() === 'aaabbb');
    // Tab indents a list item
    be = mkBE('- x');
    blk = be.host.querySelector('.blk'); blk.focus(); setCaretEnd(blk);
    key(blk, 'Tab');
    check('Tab indents list item', be.serialize() === '  - x');
    key(focusedContent(), 'Tab', { shiftKey: true });
    check('Shift+Tab outdents list item', be.serialize() === '- x');
  });

  // ============ wikilink autocomplete + click ============
  section('wikilink autocomplete + navigation', () => {
    const be = mkBE('');
    const blk = be.host.querySelector('.blk'); blk.focus();
    type(blk, 'see [[Al');
    const menu = document.querySelector('.blk-menu');
    check('[[ opens title autocomplete', !!menu && /Alpha/.test(menu.textContent));
    key(blk, 'Enter');
    check('selecting inserts [[Alpha]]', be.serialize() === 'see [[Alpha]]');
    // blur -> renders anchor; click navigates
    blk.dispatchEvent(new FocusEvent('focusout', { bubbles: true }));
    const anchor = be.host.querySelector('a[data-wikilink]');
    check('blurred wikilink renders anchor', !!anchor);
    anchor.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
    check('wikilink click navigates', mkBE._opened === 'Alpha');
  });

  // ============ checkbox toggle ============
  section('checkbox toggle', () => {
    const be = mkBE('- [ ] task');
    const chk = be.host.querySelector('.blk-check');
    chk.dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('checkbox toggles to done', be.serialize() === '- [x] task');
    chk.dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('checkbox toggles back', be.serialize() === '- [ ] task');
  });

  // ============ undo / redo ============
  section('undo / redo', () => {
    const be = mkBE('abc');
    const blk = be.host.querySelector('.blk'); blk.focus(); setCaretEnd(blk);
    key(blk, 'Enter');
    check('split -> 2 blocks', be.host.querySelectorAll('.blk-row').length === 2);
    key(focusedContent(), 'z', { ctrlKey: true });
    check('undo reverts split', be.serialize() === 'abc' && be.host.querySelectorAll('.blk-row').length === 1);
    key(be.host.querySelector('.blk'), 'z', { ctrlKey: true, shiftKey: true });
    check('redo re-applies split', be.host.querySelectorAll('.blk-row').length === 2);
  });

  // ============ paste explosion ============
  section('multi-line paste explodes into blocks', () => {
    const be = mkBE('');
    const blk = be.host.querySelector('.blk'); blk.focus();
    const dt = new DataTransfer();
    dt.setData('text/plain', '# Title\n\n- a\n- b');
    blk.dispatchEvent(new ClipboardEvent('paste', { clipboardData: dt, bubbles: true, cancelable: true }));
    check('paste creates heading + 2 bullets', !!be.host.querySelector('.blk-row[data-type="heading"]') && be.host.querySelectorAll('.blk-row[data-type="bullet"]').length === 2);
  });

  // ============ drag reorder ============
  section('drag reorder', () => {
    const be = mkBE('first\n\nsecond');
    const rows = () => [...be.host.querySelectorAll('.blk-row')];
    const handle = rows()[0].querySelector('.blk-handle');
    const targetRow = rows()[1];
    const dt = new DataTransfer();
    handle.dispatchEvent(new DragEvent('dragstart', { dataTransfer: dt, bubbles: true }));
    const rect = targetRow.getBoundingClientRect();
    const dropY = rect.top + rect.height - 1; // drop AFTER target
    targetRow.dispatchEvent(new DragEvent('dragover', { dataTransfer: dt, bubbles: true, clientY: dropY, cancelable: true }));
    targetRow.dispatchEvent(new DragEvent('drop', { dataTransfer: dt, bubbles: true, clientY: dropY, cancelable: true }));
    check('drag reorder moves block', be.serialize() === 'second\n\nfirst');
  });

  // ============ XSS inert ============
  section('XSS-safe rendering', () => {
    const be = mkBE('bad <script>window.__x=1<\/script> <img src=x onerror="window.__x=1">');
    check('no <script> in DOM', !be.host.innerHTML.toLowerCase().includes('<script'));
    check('no onerror in DOM', !be.host.innerHTML.toLowerCase().includes('onerror'));
    check('XSS did not execute', window.__x === undefined);
  });

  // ============ full app: tag mid-edit keeps content; serialize round-trip ============
  section('editor integration + no data loss on tag', () => {
    const db = new Database();
    const note = db.createNote({ title: 'N', content: 'original' });
    const container = document.createElement('div'); scratch.appendChild(container);
    const editor = new Editor(container, db, { openNote: () => {}, openOrCreateByTitle: () => {} });
    db.subscribe(() => editor.refresh());
    editor.open(note.id);
    const blk = container.querySelector('.blk'); blk.focus();
    type(blk, 'EDITED');
    blk.dispatchEvent(new FocusEvent('focusout', { bubbles: true }));
    const tagInput = container.querySelector('.editor__tag-input');
    tagInput.value = 'tagx';
    key(tagInput, 'Enter');
    const saved = db.getNote(note.id);
    check('tag added', saved.tags.includes('tagx'));
    check('block edit not lost on tag add', saved.content.includes('EDITED'));
  });

  // ============ banner: add / gradient / change / url / reposition / remove ====
  const mkBanner = (initial) => {
    const host = document.createElement('div'); host.className = 'editor__banner'; scratch.appendChild(host);
    let banner = initial ?? null;
    const bc = new BannerControl(host, { getBanner: () => banner, onChange: (b) => { banner = b; bc.render(); } });
    return { host, bc, get: () => banner };
  };

  section('banner: add + gradient render', () => {
    const b = mkBanner(null);
    check('no banner shows "Add banner" button', !!b.host.querySelector('.banner-add') && !b.host.querySelector('.banner'));
    b.host.querySelector('.banner-add').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('clicking Add banner sets a gradient', b.get() && b.get().type === 'gradient');
    check('gradient strip renders', !!b.host.querySelector('.banner.banner--gradient'));
    check('gradient has no Reposition button', !b.host.querySelector('[data-act="reposition"]'));
  });

  section('banner: change picker + swatch + url', () => {
    const b = mkBanner({ type: 'gradient', value: BANNER_GRADIENTS[0], position: 50 });
    b.host.querySelector('[data-act="change"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    const picker = document.querySelector('.banner-picker');
    check('Change opens the picker', !!picker);
    check('picker shows all gradient swatches', picker.querySelectorAll('.banner-swatch').length === BANNER_GRADIENTS.length);
    check('picker has upload + url controls', !!picker.querySelector('.banner-picker__upload') && !!picker.querySelector('.banner-picker__url'));
    // pick a different swatch
    picker.querySelectorAll('.banner-swatch')[3].dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('swatch applies its gradient', b.get().value === BANNER_GRADIENTS[3]);
    check('picker closed after choosing', !document.querySelector('.banner-picker'));
    // apply an image URL
    b.host.querySelector('[data-act="change"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    const p2 = document.querySelector('.banner-picker');
    p2.querySelector('.banner-picker__url').value = 'https://example.com/pic.png';
    p2.querySelector('.banner-picker__url-apply').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('URL applies as an image banner', b.get().type === 'image' && b.get().value === 'https://example.com/pic.png');
    check('image banner renders <img>', !!b.host.querySelector('.banner__img'));
    check('non-http url is rejected', (() => {
      const bb = mkBanner({ type: 'gradient', value: BANNER_GRADIENTS[0], position: 50 });
      bb.host.querySelector('[data-act="change"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
      const pp = document.querySelector('.banner-picker');
      pp.querySelector('.banner-picker__url').value = 'javascript:alert(1)';
      pp.querySelector('.banner-picker__url-apply').dispatchEvent(new MouseEvent('click', { bubbles: true }));
      const rejected = bb.get().type === 'gradient';
      document.querySelector('.banner-picker') && bb.bc.destroy();
      return rejected;
    })());
  });

  section('banner: reposition image + remove', () => {
    const b = mkBanner({ type: 'image', value: 'https://example.com/x.png', position: 50 });
    check('image banner has Reposition button', !!b.host.querySelector('[data-act="reposition"]'));
    b.host.querySelector('[data-act="reposition"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    const range = b.host.querySelector('.banner__reposition input[type="range"]');
    check('Reposition shows a slider', !!range);
    range.value = '20';
    range.dispatchEvent(new Event('change', { bubbles: true }));
    check('slider change saves new position', b.get().position === 20);
    // remove
    b.host.querySelector('[data-act="remove"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('Remove clears the banner', b.get() === null && !!b.host.querySelector('.banner-add'));
  });

  section('banner: image src is set as attribute (not innerHTML) — XSS-safe', () => {
    const b = mkBanner({ type: 'image', value: 'https://example.com/"><script>window.__b=1<\/script>', position: 50 });
    check('no script injected via banner value', !b.host.innerHTML.toLowerCase().includes('<script'));
    check('banner value did not execute', window.__b === undefined);
  });

  section('banner: picker Escape + outside-click close; live reposition preview', () => {
    const b = mkBanner({ type: 'gradient', value: BANNER_GRADIENTS[0], position: 50 });
    b.host.querySelector('[data-act="change"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('picker open', !!document.querySelector('.banner-picker'));
    document.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape', bubbles: true }));
    check('Escape closes picker', !document.querySelector('.banner-picker'));
    b.host.querySelector('[data-act="change"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    document.dispatchEvent(new MouseEvent('mousedown', { bubbles: true })); // outside click
    check('outside click closes picker', !document.querySelector('.banner-picker'));
    // live reposition preview updates the img objectPosition before commit
    const bi = mkBanner({ type: 'image', value: 'https://example.com/x.png', position: 50 });
    bi.host.querySelector('[data-act="reposition"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    const range = bi.host.querySelector('.banner__reposition input[type="range"]');
    range.value = '10';
    range.dispatchEvent(new Event('input', { bubbles: true }));
    check('reposition input updates live objectPosition', bi.host.querySelector('.banner__img').style.objectPosition.includes('10%'));
    check('live input did not yet persist', bi.get().position === 50);
  });

  await (async () => {
    const name = 'banner: upload error surfaces a message';
    try {
      const b = mkBanner({ type: 'gradient', value: BANNER_GRADIENTS[0], position: 50 });
      b.host.querySelector('[data-act="change"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
      const picker = document.querySelector('.banner-picker');
      const fileInput = picker.querySelector('input[type="file"]');
      const bad = new File(['not an image'], 'notes.txt', { type: 'text/plain' });
      Object.defineProperty(fileInput, 'files', { value: [bad], configurable: true });
      fileInput.dispatchEvent(new Event('change', { bubbles: true }));
      await new Promise((r) => setTimeout(r, 30));
      const status = picker.querySelector('.banner-picker__status');
      check(name, !status.hidden && /image/i.test(status.textContent) && b.get().type === 'gradient');
      b.bc.destroy();
    } catch (e) { results.push('FAIL  ' + name + ' — threw: ' + e.message); }
  })();

  await (async () => {
    const name = 'banner: broken image URL shows fallback overlay';
    try {
      const b = mkBanner({ type: 'image', value: 'https://invalid.invalid/nope-404.png', position: 50 });
      const img = b.host.querySelector('.banner__img');
      img.dispatchEvent(new Event('error', { bubbles: true }));
      check(name, b.host.querySelector('.banner').classList.contains('banner--broken'));
    } catch (e) { results.push('FAIL  ' + name + ' — threw: ' + e.message); }
  })();

  section('banner: value validation drops url() beacon at the note layer', () => {
    const db = new Database();
    const note = db.createNote({ title: 'N', content: 'c' });
    note.setBanner({ type: 'gradient', value: 'url(https://evil/x.gif)' });
    check('url() gradient rejected -> banner null', note.banner === null);
    note.setBanner({ type: 'image', value: 'ftp://x/y.png' });
    check('non-http/data image scheme rejected', note.banner === null);
  });

  section('banner: editor refresh does not clobber an open picker/reposition', () => {
    const db = new Database();
    const note = db.createNote({ title: 'N', content: 'c', banner: { type: 'image', value: 'https://example.com/x.png', position: 50 } });
    const container = document.createElement('div'); scratch.appendChild(container);
    const editor = new Editor(container, db, { openNote: () => {}, openOrCreateByTitle: () => {} });
    db.subscribe(() => editor.refresh());
    editor.open(note.id);
    // open reposition, then cause a foreign emit
    container.querySelector('[data-act="reposition"]').dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('reposition slider present', !!container.querySelector('.banner__reposition'));
    db.createNote({ title: 'Other', content: 'x' }); // foreign emit -> refresh()
    check('refresh bailed: reposition slider still present', !!container.querySelector('.banner__reposition'));
  });

  await (async () => {
    const name = 'banner: upload is downscaled + compressed';
    try {
      // synthesize a big image via canvas -> blob -> File
      const c = document.createElement('canvas'); c.width = 2400; c.height = 900;
      const ctx = c.getContext('2d'); ctx.fillStyle = '#3355ff'; ctx.fillRect(0, 0, 2400, 900);
      const blob = await new Promise((res) => c.toBlob(res, 'image/png'));
      const file = new File([blob], 'big.png', { type: 'image/png' });
      const dataUrl = await fileToBannerDataURL(file);
      check('upload returns a jpeg data URL', /^data:image\/jpeg/.test(dataUrl));
      const img = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = dataUrl; });
      check('upload downscaled width to <= 1600', img.naturalWidth <= 1600);
      check('upload data URL is reasonably small (< 700KB)', dataUrl.length < 700_000);
    } catch (e) { results.push('FAIL  ' + name + ' — threw: ' + e.message); }
  })();

  section('banner: persists on the note + survives editor round-trip', () => {
    const db = new Database();
    const note = db.createNote({ title: 'N', content: 'body text' });
    const container = document.createElement('div'); scratch.appendChild(container);
    const editor = new Editor(container, db, { openNote: () => {}, openOrCreateByTitle: () => {} });
    db.subscribe(() => editor.refresh());
    editor.open(note.id);

    check('drop on a pad reparents to top level', reparented && reparented[1] === null);
  });

  // ============ editable tables ============
  section('table: markdown renders an editable grid', () => {
    const be = mkBE('| A | B |\n| --- | --- |\n| 1 | 2 |');
    const cells = be.host.querySelectorAll('.blk-table th, .blk-table td');
    check('table renders 4 cells', cells.length === 4);
    check('header cells are editable', be.host.querySelector('.blk-table th')?.getAttribute('contenteditable') === 'true');
    check('table shell is non-editable', be.host.querySelector('.blk-row[data-type="table"] .blk')?.getAttribute('contenteditable') === 'false');
  });

  section('table: editing a cell updates the serialized markdown', () => {
    const be = mkBE('| A | B |\n| --- | --- |\n| 1 | 2 |');
    const cell = be.host.querySelector('.blk-table td'); // first body cell ('1')
    cell.textContent = 'X';
    cell.dispatchEvent(new InputEvent('input', { bubbles: true }));
    check('cell edit reflected in serialize', /\|\s*X\s*\|/.test(be.serialize()));
  });

  section('table: tools add a row and a column', () => {
    const be = mkBE('| A | B |\n| --- | --- |\n| 1 | 2 |');
    be.host.querySelector('[data-tbl="addrow"]').click();
    check('add row -> 3 rows', be.host.querySelectorAll('.blk-table tr').length === 3);
    be.host.querySelector('[data-tbl="addcol"]').click();
    check('add col -> 3 columns', be.host.querySelectorAll('.blk-table tr')[0].children.length === 3);
    be.host.querySelector('[data-tbl="delrow"]').click();
    check('remove row -> back to 2 rows', be.host.querySelectorAll('.blk-table tr').length === 2);
  });

  section('table: Tab past the last cell appends a row', () => {
    const be = mkBE('| A | B |\n| --- | --- |\n| 1 | 2 |');
    const cells = be.host.querySelectorAll('.blk-table th, .blk-table td');
    const last = cells[cells.length - 1];
    last.focus();
    last.dispatchEvent(new KeyboardEvent('keydown', { key: 'Tab', bubbles: true, cancelable: true }));
    check('Tab at last cell adds a row', be.host.querySelectorAll('.blk-table tr').length === 3);
  });

  section('table: slash command inserts a table', () => {
    const be = mkBE('');
    const blk = be.host.querySelector('.blk'); blk.focus();
    type(blk, '/table');
    key(blk, 'Enter');
    check('slash "table" creates a table block', !!be.host.querySelector('.blk-row[data-type="table"] .blk-table'));
    check('new table has 2x2 grid', be.host.querySelectorAll('.blk-table th, .blk-table td').length === 4);
  });

  section('table: selectable + deletable via the drag handle', () => {
    const be = mkBE('a\n\n| A | B |\n| --- | --- |\n| 1 | 2 |\n\nb');
    const handle = be.host.querySelector('.blk-row[data-type="table"] .blk-handle');
    handle.dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('table selected via handle', be.host.querySelector('.blk-row--selected')?.dataset.type === 'table');
    be.host.dispatchEvent(new KeyboardEvent('keydown', { key: 'Backspace', bubbles: true, cancelable: true }));
    check('table deleted on Backspace when selected', !be.host.querySelector('.blk-row[data-type="table"]'));
  });

  // ============ toggles (collapsible <details>) ============
  section('toggle: a details block renders as a collapsible', () => {
    const be = mkBE('<details>\n<summary>More</summary>\n\nhidden body\n\n</details>');
    const row = be.host.querySelector('.blk-row[data-type="raw"]');
    check('renders a <details>', !!row?.querySelector('details'));
    check('renders a <summary>', /More/.test(row?.querySelector('summary')?.textContent || ''));
    check('toggle round-trips through serialize', /<details>/.test(be.serialize()) && /<\/details>/.test(be.serialize()));
  });

  section('toggle: slash command inserts a collapsible', () => {
    const be = mkBE('');
    const blk = be.host.querySelector('.blk'); blk.focus();
    type(blk, '/toggle');
    key(blk, 'Enter');
    // Focused block shows raw source; blur it to render the details.
    be.serialize();
    check('slash "toggle" scaffolds a <details> source', /<details>/.test(be.serialize()));
  });

  // ============ a11y fixes ============
  section('todo checkbox is a keyboard-operable, labeled control', () => {
    const be = mkBE('- [ ] task');
    const box = be.host.querySelector('.blk-check');
    check('checkbox is a real <button>', !!box && box.tagName === 'BUTTON');
    check('checkbox has an accessible name', box.getAttribute('aria-label') === 'Toggle to-do');
    check('checkbox exposes role + unchecked state', box.getAttribute('role') === 'checkbox' && box.getAttribute('aria-checked') === 'false');
    box.dispatchEvent(new MouseEvent('click', { bubbles: true })); // native buttons also fire this on Space/Enter
    check('activating toggles checked + aria-checked', be.serialize().includes('[x]') && box.getAttribute('aria-checked') === 'true');
  });

  section('tag filter chip exposes aria-pressed toggle state', () => {
    const els = mkListEls();
    const db = new Database();
    db.createNote({ title: 'Tagged', content: '', tags: ['work'] });
    const nl = new NoteList(els, db, { onOpen() {}, onTogglePin() {}, onReparent() {}, onNewChild() {} });
    nl.render();
    const chip = els.tags.querySelector('.tag-chip[data-tag="work"]');
    check('chip starts aria-pressed=false', !!chip && chip.getAttribute('aria-pressed') === 'false');
    chip.dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check('chip becomes aria-pressed=true when active', els.tags.querySelector('.tag-chip[data-tag="work"]').getAttribute('aria-pressed') === 'true');
  });

  section('block editor preserves undo history across a same-note rebuild', () => {
    const be = mkBE('one');
    const blk = be.host.querySelector('.blk'); blk.focus();
    type(blk, 'one edited'); // creates an undo step
    // Simulate editor.js rebuilding the block editor for the SAME note (e.g. a tag
    // was added), carrying history across so it isn't wiped.
    const be2 = new BlockEditor(mkHost(), { initialMarkdown: be.serialize(), history: be.exportHistory(), getTitles: () => [] });
    const before = be2.serialize();
    be2.host.dispatchEvent(new KeyboardEvent('keydown', { key: 'z', ctrlKey: true, bubbles: true, cancelable: true }));
    check('undo still reverts after the rebuild', before === 'one edited' && be2.serialize() === 'one');
  });

  // ============ note export (shareable HTML) ============
  section('note export: wikilinks flatten to plain text (no dead links)', () => {
    const flat = flattenExportWikilinks('<p>See <a href="#" class="wikilink" data-wikilink="Alpha">Alpha</a> now</p>');
    check('wikilink anchor becomes a span', !/<a[^>]*data-wikilink/.test(flat) && /<span class="wikilink">Alpha<\/span>/.test(flat));
  });

  section('note export: builds a self-contained HTML doc from rendered markdown', () => {
    setKnownTitles(['Alpha']);
    const inner = flattenExportWikilinks(renderMarkdown('# Hi\n\nLink to [[Alpha]] and **bold**.'));
    const doc = buildNoteHtmlDoc('My Export', inner);
    const tpl = document.createElement('template'); tpl.innerHTML = doc; // must parse
    check('doc carries the title', doc.includes('<title>My Export</title>'));
    check('doc embeds the rendered + flattened content', doc.includes('<span class="wikilink">Alpha</span>') && /<strong>bold<\/strong>/.test(doc) && !doc.includes('data-wikilink'));
    check('doc is self-contained (inline style, no external asset refs)', doc.includes('<style>') && !/\ssrc=|https?:\/\//i.test(doc));
  });

  const failures = results.filter((r) => r.startsWith('FAIL')).length;
  const summary = failures === 0 ? `ALL PASS (${results.length})` : `FAILURES: ${failures} of ${results.length}`;
  document.getElementById('out').textContent = summary + '\n' + results.join('\n');
  document.title = summary;
</script>
</body>
</html>
