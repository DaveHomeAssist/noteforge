name: Deploy My Notes

# Build + test on every push to main, then publish the static Vite build to
# GitHub Pages (davehomeassist.github.io/my-notes-app/). Manual runs allowed.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: my-notes-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Actions pinned by SHA per GitHub's security-hardening guide.
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Node
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (markdown round-trip, migrations, model)
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser feature tests (headless)
        run: npm run test:browser

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        # NB: deploy-pages caps `timeout` at 600000ms (10 min); the first deploy of a
        # freshly-provisioned Pages site can exceed that while queued and report a
        # false failure even though the publish lands. Steady-state deploys finish in
        # seconds. A transient "Deployment failed, try again later" just needs a re-run.
